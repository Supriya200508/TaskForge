server.port=8080

spring.application.name=taskforge
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskforge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
taskforge.app.jwtSecret=${JWT_SECRET:TaskForgeSecretKeyThatNeedsToBeLongEnoughForHS256AlgorithmOfAtLeast256Bits12345}
taskforge.app.jwtExpirationMs=${JWT_EXPIRATIONMS:86400000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
